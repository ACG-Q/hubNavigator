name: 💬 ChatOps

# 触发条件：当有人在 Issue 下发表评论时运行
on:
  issue_comment:
    types: [created]

jobs:
  ops:
    # 过滤器：仅当评论以 "/" 开头（表示指令）且不是在 PR 中时运行
    if: startswith(github.event.comment.body, '/') && !github.event.issue.pull_request
    runs-on: ubuntu-latest
    permissions:
      issues: write
      contents: write

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Pull Latest Changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git pull origin master --rebase

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install Deps
        run: pip install -r requirements.txt

      - name: Run Ops Script
        # 执行管理员指令处理脚本（如 /approve, /update, /category）
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
          COMMENT_BODY: ${{ github.event.comment.body }}
          COMMENT_AUTHOR: ${{ github.event.comment.user.login }}
        run: python scripts/comment_ops.py

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Node Deps
        run: npm install

      - name: Run Parser (Sync Data)
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
          ISSUE_ID: ${{ github.event.issue.number }}
        run: |
          # Fetch latest issue state (body & labels) because python script might have changed them
          gh issue view $ISSUE_NUMBER --json body,labels,state > issue_data.json
          
          echo "DEBUG: issue_data.json content:"
          cat issue_data.json
          
          export ISSUE_BODY=$(jq -r .body issue_data.json)
          # Join labels with comma
          export ISSUE_LABELS=$(jq -r '.labels[].name' issue_data.json | paste -sd "," -)
          export ISSUE_STATE=$(jq -r .state issue_data.json)
          
          echo "DEBUG: ISSUE_STATE=${ISSUE_STATE}"
          
          echo "Running parser with updated issue data..."
          node scripts/parser.js

      - name: Sync Site Data
        run: node scripts/build_site_all.js

      - name: Commit Changes
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "🤖 Auto: Sync data after ChatOps command [skip ci]"
          file_pattern: 'data/items/*.json data/site_all.json data/categories.json public/sitemap.xml'
          skip_fetch: false
          skip_checkout: false
