name: 🚀 Deploy to Pages

# 触发条件：当 main 分支有代码推送到仓库时
on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v3
        with:
          node-version: 20
          cache: 'npm'

      - name: Install
        run: npm ci

      - name: Unsafe Perm Check
        # 执行项目构建（使用 Vite）
        run: npm run build

      - name: Generate SSG Pages
        # 执行静态生成脚本，为每个站点生成独立的详情页，确保 SEO 友好
        run: node scripts/ssg_generator.js

      - name: Upload artifact
        # 上传编译产物到 GitHub Pages
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist

  deploy:
    # 部署到 GitHub Pages 托管环境
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
