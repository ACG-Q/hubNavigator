name: "🚀 OPS: Add New Category"

on:
  workflow_dispatch:
    inputs:
      issue_number:
        description: "Issue number containing the category proposal"
        required: true

jobs:
  add-category:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Pull Latest Changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git pull origin master --rebase

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      - name: Run Add Category Script
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          ISSUE_NUMBER: ${{ github.event.inputs.issue_number }}
        run: node scripts/add_category.js

      - name: 🚀 Commit & Push Changes
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "🤖 Auto: Add new category via Issue #${{ github.event.inputs.issue_number }}"
          branch: ${{ github.ref_name }}
          file_pattern: 'config/categories.yaml .github/ISSUE_TEMPLATE/*.yml'
